  body {

    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ============ BRAIN SVG ICON ============ */
  .brain-icon {
    width: 90px;
    height: 130px;
    flex-shrink: 0;
    position: relative;
  }

  .brain-icon svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* ============ TEXT BLOCK ============ */
  .text-block {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .brand-smart {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 58px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 4px;
    line-height: 1;
    text-shadow: 0 2px 12px rgba(0,0,0,0.2);

  .brand-separator {
    width: 100%;

    font-family: 'Playfair Display', Georgia, serif;
    font-size: 58px;
    font-weight: 700;
    background: linear-gradient(135deg, #C9A84C 0%, #F0C355 50%, #A8732A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 8px;
    line-height: 1;
    filter: drop-shadow(0 0 8px rgba(240,195,85,0.3));
  }

  .brand-tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 3.5px;
    color: rgba(255,255,255,0.45);
    margin-top: 10px;
    text-transform: uppercase;
  }

  /* ============ LOGO CARD - LIGHT ============ */
  .logo-light {
    background: #FFFFFF;
    border-radius: 28px;
    padding: 40px 56px;
    display: flex;
    align-items: center;
    gap: 36px;
    box-shadow: 0 8px 40px rgba(13,27,62,0.10), 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid rgba(13,27,62,0.08);
  }

  .logo-light .brand-smart {
    color: #0D1B3E;
  }

  .logo-light .brand-tagline {
    color: rgba(13,27,62,0.35);
  }

  /* ============ COMPACT ICON ONLY ============ */

    height: 90px;

  .row {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ============ ANIMATED GLOW ============ */

    50% { filter: drop-shadow(0 0 14px rgba(240,195,85,0.5)); }

  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-dark, .logo-light, .logo-icon-only {
    animation: fadeUp 0.6s ease both;
  }

  .logo-icon-only { animation-delay: 0.3s; }
</style>
